{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>TextUtils | Result Page</title>
    <link rel="stylesheet" href="{% static "css/style.css" %}">
    <style>
      body {
        font-family: Arial, sans-serif;
        background-color: rgb(253, 245, 170);
        margin: 0;
        padding: 0;
        color: rgb(17, 63, 103);
        display: flex;
        flex-direction: column;
        align-items: center;
      }

      h1 {
        background-color: rgb(17, 63, 103);
        color: white;
        padding: 20px;
        width: 100%;
        text-align: center;
        margin: 0 0 20px 0;
      }

      p {
        width: 80%;
        max-width: 800px;
        background: white;
        padding: 20px;
        border-radius: 8px;
        box-shadow: 0 2px 4px rgba(52, 105, 154, 0.3);
      }

      pre {
        white-space: pre-wrap;
        font-size: 16px;
        line-height: 1.5;
        color: rgb(17, 63, 103);
      }
    </style>
</head>
<body>
<h1>Your Analyzed Text - {{ purpose }}</h1>
<p>
    <pre>{{ analyzed_text }}</pre>
</p>
</body>
</html>
